<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MarkWise AI — Smarter marking, better teaching.</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230D47A1'/><text x='50' y='68' font-family='Poppins,Arial' font-size='60' font-weight='800' fill='white' text-anchor='middle'>M</text></svg>" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand-logo">
      <div class="brand-icon">M</div>
      <div>
        <div class="brand-name">MarkWise AI</div>
      </div>
    </div>
    <div class="auth-tagline">Smarter marking, better teaching.</div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Login</button>
      <button class="auth-tab" data-tab="register">Create Account</button>
    </div>

    <!-- LOGIN -->
    <form id="loginForm">
      <div id="loginAlert"></div>
      <div class="form-group">
        <label class="form-label">Email or phone number</label>
        <input type="text" class="form-control" id="loginId" placeholder="teacher@demo.com" value="teacher@demo.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="loginPass" placeholder="••••••••" value="password123" required />
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <label class="form-check"><input type="checkbox" checked /> Remember me</label>
        <a href="#" id="forgotLink" style="font-size:12px;">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fa fa-sign-in-alt"></i> Login</button>

      <div class="divider">or</div>
      <button type="button" class="btn btn-light btn-block" id="phoneLoginBtn"><i class="fa fa-phone"></i> Login with phone number</button>
    </form>

    <!-- REGISTER -->
    <form id="registerForm" style="display:none;">
      <div id="regAlert"></div>
      <div class="form-group">
        <label class="form-label">Full name</label>
        <input type="text" class="form-control" id="regName" placeholder="e.g. Mr. Dlamini" required />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="regEmail" placeholder="you@school.edu" />
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" class="form-control" id="regPhone" placeholder="+27..." />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="regPass" placeholder="At least 6 characters" required />
      </div>
      <button type="submit" class="btn btn-primary"><i class="fa fa-user-plus"></i> Create Account</button>
    </form>

    <p style="text-align:center;margin-top:18px;font-size:12px;color:var(--grey-500);">
      <i class="fa fa-lock"></i> Secure. Private. Built for Teachers.
    </p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
MarkWise.initAuth();
</script>
</body>
</html>
